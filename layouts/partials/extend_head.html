<script>
  // Active section highlighting with IntersectionObserver
  document.addEventListener('DOMContentLoaded', function() {
    const tocLinks = document.querySelectorAll('.toc-link');
    if (tocLinks.length === 0) return;

    const headings = [];
    tocLinks.forEach(link => {
      const id = link.getAttribute('data-section');
      const heading = document.getElementById(id);
      if (heading) {
        headings.push({ id, element: heading, link });
      }
    });

    if (headings.length === 0) return;

    // Set initial active state
    tocLinks.forEach(link => link.classList.remove('active'));

    const observerOptions = {
      root: null,
      rootMargin: '0px 0px -85% 0px',
      threshold: 0
    };

    let visibleSections = [];

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const id = entry.target.id;
        const link = document.querySelector(`.toc-link[data-section="${id}"]`);
        if (link) {
          if (entry.isIntersecting) {
            visibleSections.push({ id, level: parseInt(entry.target.tagName.charAt(1)) });
          } else {
            visibleSections = visibleSections.filter(s => s.id !== id);
          }
        }
      });

      // Highlight the deepest (most specific) visible section
      if (visibleSections.length > 0) {
        visibleSections.sort((a, b) => b.level - a.level);
        const deepest = visibleSections[0];
        tocLinks.forEach(l => l.classList.remove('active'));
        const activeLink = document.querySelector(`.toc-link[data-section="${deepest.id}"]`);
        if (activeLink) activeLink.classList.add('active');
      }
    }, observerOptions);

    headings.forEach(h => observer.observe(h.element));

    // Smooth scroll for TOC links
    tocLinks.forEach(link => {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        const id = this.getAttribute('data-section');
        const target = document.getElementById(id);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth' });
          history.pushState(null, null, '#' + id);
        }
      });
    });
  });
</script>

<script>
// Waveform Animation - Bottom positioned, continuous animation
(function() {
  let canvas, ctx, animationId, bars = [];
  let time = 0;
  let isRunning = false;

  function init() {
    canvas = document.getElementById('waveform-canvas');
    if (!canvas) {
      console.log('Waveform canvas not found, retrying...');
      setTimeout(init, 100);
      return false;
    }

    ctx = canvas.getContext('2d');
    window.addEventListener('resize', resize);

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        isRunning = false;
      } else {
        isRunning = true;
        if (!animationId) animate();
      }
    });

    return true;
  }

  function resize() {
    if (!canvas) return;
    const container = canvas.parentElement;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = container.offsetWidth * dpr;
    canvas.height = container.offsetHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    initBars();
  }

  function initBars() {
    bars = [];
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const width = canvas.width / dpr;
    const height = canvas.height / dpr;
    const barCount = Math.floor(width / 4);

    for (let i = 0; i < barCount; i++) {
      bars.push({
        x: (i / barCount) * width,
        baseHeight: Math.random() * height * 0.6 + height * 0.2,
        amplitude: Math.random() * height * 0.3,
        frequency: 0.02 + Math.random() * 0.04,
        phase: Math.random() * Math.PI * 2,
        opacity: 0.1 + Math.random() * 0.3,
        speed: 0.5 + Math.random() * 1.5
      });
    }
  }

  function animate() {
    if (!canvas || !isRunning) return;

    const dpr = window.devicePixelRatio || 1;
    const width = canvas.width / dpr;
    const height = canvas.height / dpr;

    ctx.clearRect(0, 0, width, height);

    bars.forEach(bar => {
      // Continuous oscillation animation
      const oscillation = Math.sin(time * bar.frequency * bar.speed + bar.phase) * bar.amplitude;
      const barHeight = Math.max(2, bar.baseHeight + oscillation);
      const barWidth = 2;

      // Draw from bottom
      const y = height - barHeight;

      ctx.fillStyle = `rgba(136, 136, 136, ${bar.opacity})`;
      ctx.fillRect(bar.x, y, barWidth, barHeight);
    });

    time += 0.016; // ~60fps
    animationId = requestAnimationFrame(animate);
  }

  function start() {
    if (!canvas && !init()) return;
    resize();
    isRunning = true;
    if (animationId) cancelAnimationFrame(animationId);
    animationId = requestAnimationFrame(animate);
  }

  // Start when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', start);
  } else {
    start();
  }
})();
</script>
